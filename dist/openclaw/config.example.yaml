# WeWrite 配置
# 复制为 config.yaml 并填入你的信息

# 微信公众号 API（发布草稿 + 数据统计必需）
wechat:
  appid: "wx_your_appid"
  secret: "your_appsecret"
  author: ""  # 默认署名（可选）

# AI 图片生成
image:
  # 推荐：OpenAI-compatible image2 / gpt-image-2
  # 可选 provider: openai | doubao
  provider: "openai"
  api_key: "your_api_key"

  # image2 / gpt-image-2（默认推荐）
  model: "gpt-image-2"
  base_url: "https://api.openai.com/v1"
  quality: "medium"       # low | medium | high
  output_format: "jpeg"   # jpeg 更适合微信公众号上传体积限制

  # doubao-seedream 备选
  # provider: "doubao"
  # api_key: "your_doubao_key"
  # model: "doubao-seedream-5-0-260128"
  # base_url: "https://ark.cn-beijing.volces.com/api/v3"

# 默认排版主题
theme: "professional-clean"
